<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INTERPOL-DE💶🗿</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .custom-button {
      margin-top: 15px;
      padding: 12px 24px;
      cursor: pointer;
      background: #ff0000; /* "backround" war auch ein Tippfehler */
    }
  </style>

  <script>
    function playSound() {
      new Audio("https://www.myinstants.com/media/sounds/epstein-funk-tuff.mp3").play();
    }
  </script>
</head>
<body>

  <h1>Hier Zahlen sie 81.00€ fe</h1>
  <button class="custom-button" onclick="playSound()">Hier Zahlen💶</button>

<div style="text-align: center;">
  <p>______, ich bin gay und negger:</p>
  <select>
    <option>Ja</option>
    <option>Nein</option>
    <option>Vielleicht</option>
  </select>
</div>

<input type="checkbox" id="box"> Ich stimme zu

<button onclick="prüfen()">Weiter</button>

<script>
  function prüfen() {
    const box = document.getElementById("box");
    if (box.checked) {
      // Checkbox ist angehakt → Funktion ausführen
      playSound();
    } else {
      alert("Bitte erst die Checkbox ankreuzen!");
    }
  }
</script>
  
</body>
</html>
